<form class="{{cssClass}} a-fistful-of-darkness sheet item {{itemType}}" autocomplete="off">
  <header class="sheet-header">
    <img class="item-img" src="{{item.img}}" data-edit="img" title="{{item.name}}" />
    <div class="header-fields">
      <h1><input name="name" type="text" value="{{item.name}}" placeholder="{{localize 'AFOD.Name'}}" /></h1>
      <span class="item-type-label">{{localize "TYPES.Item.crew_upgrade"}}</span>
    </div>
  </header>
  <section class="sheet-body">
    <div class="form-group">
      <label>{{localize "AFOD.Description"}}</label>
      {{#if isEditable}}
          <textarea name="system.description" class="notes-textarea">{{system.description}}</textarea>
        {{else}}
          <div class="notes-view">{{{enrichedDescription}}}</div>
        {{/if}}
    </div>
    <div class="form-fields">
      <div class="form-group">
        <label>{{localize "AFOD.CrewType"}}</label>
        <select name="system.class">
          <option value="">— {{localize "AFOD.SelectCrewType"}} —</option>
          {{#each crewTypeOptions}}
            <option value="{{this.value}}" {{#if (eq this.value ../system.class)}}selected{{/if}}>
              {{this.label}}
            </option>
          {{/each}}
        </select>
      </div>
      <div class="form-group">
        <label>{{localize "AFOD.Price"}}</label>
        <input type="number" name="system.price" value="{{system.price}}" min="0" />
      </div>
      <div class="form-group">
        <label>{{localize "AFOD.Purchased"}}</label>
        <input type="checkbox" name="system.purchased" {{checked system.purchased}} />
      </div>
    </div>
  </section>
</form>
